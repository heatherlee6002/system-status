<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LEP Status</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, monospace;
  background: #0b0f19;
  color: #e6edf3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 30px 40px;
  width: 420px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  margin-bottom: 5px;
  font-size: 20px;
}

.sub {
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.label { opacity: 0.7; }

.ok { color: #22c55e; }

/* warnings now red */
.warn { color: #ef4444; }
.err { color: #ef4444; }

.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}

.log {
  margin-top: 10px;
  font-size: 11px;
  opacity: 0.7;
  height: 90px;
  overflow-y: auto;
  background: rgba(255,255,255,0.03);
  padding: 8px;
  border-radius: 6px;
}

.hidden-link {
  color: inherit;
  text-decoration: none;
  cursor: default;
}
</style>
</head>

<body>

<div class="card">
  <h1>LEP Status</h1>
  <div class="sub">v1.0.0 — final release</div>

  <div class="row">
    <div class="label">execution</div>
    <div class="ok">ON_SCHEDULE</div>
  </div>

  <div class="row">
    <div class="label">release</div>
    <div class="ok">COMPLETE</div>
  </div>

  <div class="row">
    <div class="label">strategy.local</div>
    <div class="ok">DEFINED</div>
  </div>

  <div class="row">
    <div class="label">org.strategy.lookup</div>
    <div class="err">NOT_FOUND</div>
  </div>

  <div class="row">
    <div class="label">expertise.lookup</div>
    <div class="err">NOT_FOUND</div>
  </div>

  <div class="row">
    <div class="label">ownership</div>
    <div class="warn">UNRESOLVED</div>
  </div>

  <div class="row">
    <div class="label">alignment</div>
    <div class="warn">EVENTUAL</div>
  </div>

  <div class="footer">
    <div id="status">monitoring...</div>
    <div>
      <a href="/postmortem" class="hidden-link">
        handover.complete = true;
      </a>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const logs = [
  "[INFO] Deployment successful",
  "[INFO] Execution on schedule",
  "[WARN] org.strategy lookup returned NOT_FOUND",
  "[WARN] expertise lookup returned NOT_FOUND",
  "[WARN] ownership unresolved",
  "[INFO] Entering runtime",
  "[ERROR] Undefined behavior expected"
];

let i = 0;
const logDiv = document.getElementById("log");

setInterval(() => {
  if (i < logs.length) {
    const line = document.createElement("div");
    line.textContent = logs[i];

    if (logs[i].includes("WARN") || logs[i].includes("ERROR")) {
      line.style.color = "#ef4444";
    }

    logDiv.appendChild(line);
    logDiv.scrollTop = logDiv.scrollHeight;

    // trigger modal
    if (logs[i].includes("expertise lookup returned NOT_FOUND")) {
      setTimeout(showModal, 400);
    }

    i++;
  }
}, 1200);

function showModal() {
  const modal = document.createElement("div");

  modal.innerHTML = `
    <div style="
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    ">
      <div style="
        background: #111827;
        padding: 20px;
        border-radius: 12px;
        width: 320px;
        font-family: monospace;
        color: #e6edf3;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      ">
        <div style="margin-bottom: 15px; font-size: 14px;">
          expertise NOT_FOUND<br><br>
          continue product?
        </div>

        <div style="display: flex; justify-content: space-between;">
          <button onclick="continueFailure()" style="
            background:#22c55e;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
          ">Proceed</button>

          <button onclick="closeModal()" style="
            background:#374151;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            color:white;
          ">Cancel</button>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(modal);
  window.currentModal = modal;
}

function closeModal() {
  if (window.currentModal) {
    document.body.removeChild(window.currentModal);
  }
}

function continueFailure() {
  closeModal();

  const line = document.createElement("div");
  line.textContent = "[FATAL] proceeding... failure expected";
  line.style.color = "#ef4444";

  logDiv.appendChild(line);
  logDiv.scrollTop = logDiv.scrollHeight;
}
</script>

</body>
</html>
